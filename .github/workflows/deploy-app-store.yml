# Builds the CQSatellites iOS app and publishes it to the App Store via App Store Connect.
#
# Versioning strategy:
#   - Version format: MAJOR.MINOR.BUILD_NUMBER (e.g. 1.0.19)
#   - MAJOR and MINOR are read from the latest git tag (e.g. v1.0.x → MAJOR=1, MINOR=0).
#   - BUILD_NUMBER is github.run_number, providing a monotonically increasing build counter.
#   - CFBundleShortVersionString (marketing version) = MAJOR.MINOR.BUILD_NUMBER.
#   - CFBundleVersion (build number) = github.run_number.
#   - Trigger a release by pushing a semver git tag to bump MAJOR or MINOR (e.g. v1.1.0, v2.0.0).
#   - A GitHub Release is created automatically after a successful upload, with auto-generated
#     release notes based on commits since the previous tag.
#   - workflow_dispatch allows manual deploys with an explicit version override.
#
# Required repository secrets:
#   CERTIFICATES_P12            – Base64-encoded Apple Distribution certificate (.p12)
#   CERTIFICATES_P12_PASSWORD   – Password protecting the .p12 file
#   PROVISIONING_PROFILE_BASE64 – Base64-encoded App Store provisioning profile (.mobileprovision)
#   APP_STORE_CONNECT_API_KEY_ID        – App Store Connect API key ID (e.g. ABC1234567)
#   APP_STORE_CONNECT_API_ISSUER_ID     – App Store Connect API issuer UUID
#   APP_STORE_CONNECT_API_KEY_CONTENT   – Base64-encoded contents of the .p8 private key file
#   TEAM_ID                     – Apple Developer Team ID (e.g. ABCDE12345)
#
# How to encode files as Base64 for secrets:
#   base64 -i Certificate.p12 | pbcopy
#   base64 -i Profile.mobileprovision | pbcopy
#   base64 -i AuthKey_XXXXXXX.p8 | pbcopy

name: Deploy to App Store

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch:
    inputs:
      version:
        description: "Marketing version to deploy (e.g. 1.2.3). Defaults to latest git tag."
        required: false
        default: ""
      skip_tests:
        description: "Skip running tests before archiving"
        required: false
        default: "false"
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  SCHEME: CQSatellites
  BUNDLE_ID: com.digimangos.cqsatellites
  XCODE_PROJECT: CQSatellites.xcodeproj
  ARCHIVE_PATH: ${{ github.workspace }}/build/CQSatellites.xcarchive
  EXPORT_PATH: ${{ github.workspace }}/build/CQSatellitesExport

permissions:
  contents: write

jobs:
  deploy:
    name: Build & Upload to App Store
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Select latest available Xcode
        run: |
          ls /Applications/ | grep Xcode
          XCODE_PATH=$(find /Applications -maxdepth 1 -name 'Xcode*.app' -print | sort -V | tail -1)
          if [ -z "$XCODE_PATH" ]; then
            echo "Error: No Xcode installation found"
            exit 1
          fi
          echo "Selecting: $XCODE_PATH"
          sudo xcode-select -s "$XCODE_PATH/Contents/Developer"
          xcodebuild -version

      # ── Version numbers ────────────────────────────────────────────────────────

      - name: Compute version numbers
        id: version
        run: |
          BUILD="${{ github.run_number }}"

          # Marketing version: MAJOR.MINOR.BUILD_NUMBER
          # Manual override takes priority, otherwise derive MAJOR.MINOR from latest tag.
          if [[ -n "${{ github.event.inputs.version }}" ]]; then
            MARKETING="${{ github.event.inputs.version }}"
          else
            # Get MAJOR.MINOR from the latest semver tag (tag used to bump major/minor)
            LATEST_TAG=$(git describe --tags --match "v[0-9]*.[0-9]*.[0-9]*" \
              --abbrev=0 2>/dev/null || echo "v1.0.0")
            LATEST="${LATEST_TAG#v}"
            IFS='.' read -r MAJOR MINOR _PATCH <<< "$LATEST"
            MARKETING="${MAJOR}.${MINOR}.${BUILD}"
          fi

          echo "marketing_version=$MARKETING" >> "$GITHUB_OUTPUT"
          echo "build_number=$BUILD"          >> "$GITHUB_OUTPUT"
          echo "tag=v$MARKETING"              >> "$GITHUB_OUTPUT"

          echo "Marketing version : $MARKETING"
          echo "Build number      : $BUILD"

      # ── Code signing ───────────────────────────────────────────────────────────

      - name: Install distribution certificate
        env:
          CERTIFICATE_BASE64: ${{ secrets.CERTIFICATES_P12 }}
          CERTIFICATE_PASSWORD: ${{ secrets.CERTIFICATES_P12_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          KEYCHAIN_PASSWORD=$(openssl rand -base64 20)
          CERT_PATH="$RUNNER_TEMP/distribution.p12"

          echo "$CERTIFICATE_BASE64" | base64 --decode -o "$CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$CERTIFICATE_PASSWORD" -A \
            -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" \
            $(security list-keychains -d user | sed s/\"//g)

      - name: Install provisioning profile
        env:
          PROVISIONING_PROFILE_BASE64: ${{ secrets.PROVISIONING_PROFILE_BASE64 }}
        run: |
          PP_PATH="$RUNNER_TEMP/profile.mobileprovision"
          echo "$PROVISIONING_PROFILE_BASE64" | base64 --decode -o "$PP_PATH"

          PP_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PP_DIR"

          # Use the UUID embedded in the profile as the filename
          UUID=$(security cms -D -i "$PP_PATH" 2>/dev/null \
            | plutil -extract UUID raw - 2>/dev/null || \
              /usr/libexec/PlistBuddy -c 'Print UUID' \
              /dev/stdin <<< "$(security cms -D -i "$PP_PATH")")
          cp "$PP_PATH" "$PP_DIR/$UUID.mobileprovision"
          echo "Installed provisioning profile: $UUID"

      # ── Prepare ExportOptions.plist ────────────────────────────────────────────

      - name: Substitute TEAM_ID in ExportOptions.plist
        env:
          TEAM_ID: ${{ secrets.TEAM_ID }}
        run: |
          sed -i '' "s/\$(TEAM_ID)/$TEAM_ID/g" ExportOptions.plist

      # ── Resolve dependencies ───────────────────────────────────────────────────

      - name: Resolve Swift package dependencies
        run: |
          xcodebuild -resolvePackageDependencies \
            -project "$XCODE_PROJECT" \
            -scheme "$SCHEME"

      - name: Verify third-party license inventory
        run: swift Scripts/verify-third-party-licenses.swift

      # ── Test ───────────────────────────────────────────────────────────────────

      - name: Run tests
        if: ${{ github.event.inputs.skip_tests != 'true' }}
        run: |
          set -o pipefail
          DESTINATIONS_OUTPUT=$(xcodebuild -project "$XCODE_PROJECT" -scheme "$SCHEME" -showdestinations 2>/dev/null || true)
          IOS_SIM_DESTINATION_ID=$(printf '%s\n' "$DESTINATIONS_OUTPUT" \
            | awk -F'id:' '/platform:iOS Simulator/ && $0 !~ /dvtdevice-/ {
                split($2, parts, ",");
                gsub(/[[:space:]}]/, "", parts[1]);
                destinationId = parts[1];
                if ($0 ~ /name:iPhone/ && firstIPhone == "") {
                  firstIPhone = destinationId;
                }
                if (firstAny == "") {
                  firstAny = destinationId;
                }
              }
              END {
                if (firstIPhone != "") {
                  print firstIPhone;
                } else if (firstAny != "") {
                  print firstAny;
                }
              }')
          if [ -n "$IOS_SIM_DESTINATION_ID" ]; then
            TEST_DESTINATION="id=$IOS_SIM_DESTINATION_ID"
            echo "Using iOS Simulator destination: $TEST_DESTINATION"
          else
            SIMCTL_DEVICE_ID=$(xcrun simctl list devices available \
              | awk -F '[()]' '/iPhone|iPad/ {
                  if ($0 ~ /iPhone/ && firstIPhone == "") {
                    firstIPhone = $2;
                  }
                  if (firstAny == "") {
                    firstAny = $2;
                  }
                }
                END {
                  if (firstIPhone != "") {
                    print firstIPhone;
                  } else if (firstAny != "") {
                    print firstAny;
                  }
                }')
            if [ -n "$SIMCTL_DEVICE_ID" ]; then
              TEST_DESTINATION="id=$SIMCTL_DEVICE_ID"
              echo "Using iOS Simulator device from simctl: $TEST_DESTINATION"
            else
              echo "::error::No concrete iOS Simulator destination found for scheme '$SCHEME'."
              echo "::error::Cannot run tests on macOS fallback because the app target is iOS and code-sign verification fails."
              printf '%s\n' "$DESTINATIONS_OUTPUT"
              xcrun simctl list devices || true
              xcrun simctl list runtimes || true
              exit 70
            fi
          fi
          xcodebuild test \
            -project "$XCODE_PROJECT" \
            -scheme "$SCHEME" \
            -destination "$TEST_DESTINATION" \
            -resultBundlePath "$RUNNER_TEMP/TestResults.xcresult" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      # ── Archive ────────────────────────────────────────────────────────────────

      - name: Build and archive
        run: |
          xcodebuild archive \
            -project "$XCODE_PROJECT" \
            -scheme "$SCHEME" \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath "${{ env.ARCHIVE_PATH }}" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PROVISIONING_PROFILE_SPECIFIER="CQ Satellites v1" \
            DEVELOPMENT_TEAM="${{ secrets.TEAM_ID }}" \
            MARKETING_VERSION="${{ steps.version.outputs.marketing_version }}" \
            CURRENT_PROJECT_VERSION="${{ steps.version.outputs.build_number }}"

      # ── Export IPA ─────────────────────────────────────────────────────────────

      - name: Export IPA
        run: |
          xcodebuild -exportArchive \
            -archivePath "${{ env.ARCHIVE_PATH }}" \
            -exportOptionsPlist ExportOptions.plist \
            -exportPath "${{ env.EXPORT_PATH }}"

      # ── Upload to App Store Connect ────────────────────────────────────────────

      - name: Set up App Store Connect API key
        env:
          API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          API_KEY_CONTENT: ${{ secrets.APP_STORE_CONNECT_API_KEY_CONTENT }}
        run: |
          KEY_DIR="$HOME/private_keys"
          mkdir -p "$KEY_DIR"
          echo "$API_KEY_CONTENT" | base64 --decode \
            -o "$KEY_DIR/AuthKey_$API_KEY_ID.p8"

      # xcrun altool --upload-app is deprecated in Xcode 15 but remains functional for
      # iOS App Store uploads; there is no direct command-line replacement in Xcode tools.
      # A modern alternative is Fastlane's `upload_to_app_store` (deliver) action.
      - name: Upload to App Store Connect
        env:
          API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
        run: |
          IPA_PATH=$(find "${{ env.EXPORT_PATH }}" -name "*.ipa" | head -1)
          echo "Uploading: $IPA_PATH"
          OUTPUT=$(xcrun altool --upload-app \
            --type ios \
            --file "$IPA_PATH" \
            --apiKey "$API_KEY_ID" \
            --apiIssuer "$API_ISSUER_ID" 2>&1) || true
          echo "$OUTPUT"
          if echo "$OUTPUT" | grep -q "UPLOAD FAILED"; then
            echo "::error::App Store upload failed"
            exit 1
          fi

      # ── GitHub Release ─────────────────────────────────────────────────────────

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          MARKETING="${{ steps.version.outputs.marketing_version }}"
          BUILD="${{ steps.version.outputs.build_number }}"

          # Create the tag if it doesn't exist yet (manual workflow_dispatch case)
          if ! git rev-parse "$TAG" >/dev/null 2>&1; then
            git tag "$TAG"
            git push origin "$TAG"
          fi

          # Delete existing release if present (re-deploy of same version)
          gh release delete "$TAG" --yes 2>/dev/null || true

          gh release create "$TAG" \
            --title "CQSatellites $MARKETING (build $BUILD)" \
            --generate-notes \
            "${{ env.EXPORT_PATH }}"/*.ipa

      # ── Clean up keychain ──────────────────────────────────────────────────────

      - name: Clean up keychain and provisioning profile
        if: always()
        run: |
          security delete-keychain "$RUNNER_TEMP/app-signing.keychain-db" || true
