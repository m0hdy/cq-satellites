name: Squad CI

on:
  pull_request:
    branches: [dev, preview, main, insider]
    types: [opened, synchronize, reopened]
  push:
    branches: [dev, insider]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7

      - name: Verify iOS-only project metadata
        run: |
          grep -q '\.iOS(\.v17)' Package.swift
          ! grep -q '\.macOS' Package.swift
          grep -q 'platform: iOS' project.yml
          grep -q 'iOS: "17.0"' project.yml

      - name: Resolve Swift package dependencies
        run: |
          xcodebuild -resolvePackageDependencies \
            -project CQSatellites.xcodeproj \
            -scheme CQSatellites

      - name: Run unit tests
        run: |
          xcodebuild test \
            -project CQSatellites.xcodeproj \
            -scheme CQSatellites \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            CODE_SIGNING_ALLOWED=NO
