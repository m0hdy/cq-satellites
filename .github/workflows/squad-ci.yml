name: Squad CI

on:
  pull_request:
    branches: [dev, preview, main, insider]
    types: [opened, synchronize, reopened]
  push:
    branches: [dev, insider]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7

      - name: Verify iOS-only project metadata
        run: |
          grep -q '\.iOS(\.v17)' Package.swift
          ! grep -q '\.macOS' Package.swift
          grep -q 'platform: iOS' project.yml
          grep -q 'iOS: "17.0"' project.yml

      - name: Resolve Swift package dependencies
        run: |
          xcodebuild -resolvePackageDependencies \
            -project CQSatellites.xcodeproj \
            -scheme CQSatellites

      - name: Verify third-party license inventory
        run: swift Scripts/verify-third-party-licenses.swift

      - name: Run unit tests
        run: |
          set -o pipefail
          DESTINATIONS_OUTPUT=$(xcodebuild -project CQSatellites.xcodeproj -scheme CQSatellites -showdestinations 2>/dev/null || true)
          IOS_SIM_DESTINATION_ID=$(printf '%s\n' "$DESTINATIONS_OUTPUT" \
            | awk -F'id:' '/platform:iOS Simulator/ && $0 !~ /dvtdevice-/ {
                split($2, parts, ",");
                gsub(/[[:space:]}]/, "", parts[1]);
                destinationId = parts[1];
                if ($0 ~ /name:iPhone/ && firstIPhone == "") {
                  firstIPhone = destinationId;
                }
                if (firstAny == "") {
                  firstAny = destinationId;
                }
              }
              END {
                if (firstIPhone != "") {
                  print firstIPhone;
                } else if (firstAny != "") {
                  print firstAny;
                }
              }')
          if [ -n "$IOS_SIM_DESTINATION_ID" ]; then
            TEST_DESTINATION="id=$IOS_SIM_DESTINATION_ID"
            echo "Using iOS Simulator destination: $TEST_DESTINATION"
          else
            SIMCTL_DEVICE_ID=$(xcrun simctl list devices available \
              | awk -F '[()]' '/iPhone|iPad/ {
                  if ($0 ~ /iPhone/ && firstIPhone == "") {
                    firstIPhone = $2;
                  }
                  if (firstAny == "") {
                    firstAny = $2;
                  }
                }
                END {
                  if (firstIPhone != "") {
                    print firstIPhone;
                  } else if (firstAny != "") {
                    print firstAny;
                  }
                }')
            if [ -n "$SIMCTL_DEVICE_ID" ]; then
              TEST_DESTINATION="id=$SIMCTL_DEVICE_ID"
              echo "Using iOS Simulator device from simctl: $TEST_DESTINATION"
            else
              echo "::error::No concrete iOS Simulator destination found for scheme 'CQSatellites'."
              printf '%s\n' "$DESTINATIONS_OUTPUT"
              xcrun simctl list devices || true
              xcrun simctl list runtimes || true
              exit 70
            fi
          fi
          xcodebuild test \
            -project CQSatellites.xcodeproj \
            -scheme CQSatellites \
            -destination "$TEST_DESTINATION" \
            CODE_SIGNING_ALLOWED=NO
