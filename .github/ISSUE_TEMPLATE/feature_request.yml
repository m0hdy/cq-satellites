name: Feature Request
description: Suggest an idea or enhancement for CQ Satellites
labels: ["enhancement"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        Thanks for your interest in improving CQ Satellites! Please describe your feature request in detail.

  - type: input
    id: title
    attributes:
      label: Feature Title
      description: A clear, concise title for the feature
      placeholder: "e.g., Add support for geosynchronous satellite tracking"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A detailed description of the feature you're requesting
      placeholder: "Describe the feature in detail..."
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem It Solves
      description: Describe the problem or use case this feature would address
      placeholder: "What problem would this feature solve or what use case does it enable?"
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe how you envision this feature working
      placeholder: "How would you like this feature to work?"
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternative Solutions
      description: Describe any alternative solutions or features you've considered
      placeholder: "Have you considered other approaches?"

  - type: textarea
    id: examples
    attributes:
      label: Examples
      description: Are there similar features in other applications?
      placeholder: "References to similar features in other apps or projects"

  - type: input
    id: priority
    attributes:
      label: Priority
      description: How important is this feature to you?
      placeholder: "e.g., High, Medium, Low"

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Add any other context or screenshots about the feature request
      placeholder: "Any additional information that might be helpful..."
