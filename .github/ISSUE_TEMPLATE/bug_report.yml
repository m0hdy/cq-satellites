name: Bug Report
description: Report a bug to help us improve
labels: ["bug"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report! Please provide as much detail as possible to help us understand and fix the issue.

  - type: input
    id: title
    attributes:
      label: Bug Title
      description: A clear, concise title for the bug
      placeholder: "e.g., App crashes when tracking satellite X"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of what the bug is
      placeholder: "Describe the bug in detail..."
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen
      placeholder: "Describe what should happen..."
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened
      placeholder: "Describe what actually happened..."
    validations:
      required: true

  - type: input
    id: ios_version
    attributes:
      label: iOS Version
      description: What version of iOS are you running?
      placeholder: "e.g., 16.5"
    validations:
      required: true

  - type: input
    id: device
    attributes:
      label: Device
      description: What device are you using?
      placeholder: "e.g., iPhone 14 Pro, iPad Air"
    validations:
      required: true

  - type: input
    id: app_version
    attributes:
      label: App Version
      description: What version of CQ Satellites are you running?
      placeholder: "e.g., 1.0.0"
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: If applicable, add screenshots or screen recordings to help explain your problem
      placeholder: "You can drag and drop images here"

  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: If applicable, include any error messages or logs
      placeholder: "Paste any relevant console output or error messages"

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Add any other context about the problem here
      placeholder: "Any additional information that might be helpful..."
