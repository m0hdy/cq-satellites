name: SatPass
options:
  bundleIdPrefix: com.satpass
  deploymentTarget:
    iOS: "17.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete

packages:
  SatelliteKit:
    url: https://github.com/gavineadie/SatelliteKit
    from: "2.0.0"

targets:
  SatPass:
    type: application
    platform: iOS
    sources:
      - path: SatPass
        excludes:
          - "**/Tests/**"
    resources:
      - path: SatPass/Resources
        optional: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.satpass.app
        INFOPLIST_FILE: Info.plist
        GENERATE_INFOPLIST_FILE: false
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - package: SatelliteKit

  SatPassTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - SatPassTests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: true
    dependencies:
      - target: SatPass
