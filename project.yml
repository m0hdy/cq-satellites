name: CQSatellites
options:
  bundleIdPrefix: com.cqsatellites
  deploymentTarget:
    iOS: "17.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete

packages:
  SatelliteKit:
    url: https://github.com/gavineadie/SatelliteKit
    from: "2.0.0"

targets:
  CQSatellites:
    type: application
    platform: iOS
    sources:
      - path: CQSatellites
        excludes:
          - "**/Tests/**"
    resources:
      - path: CQSatellites/Resources
        optional: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.cqsatellites.app
        INFOPLIST_FILE: Info.plist
        GENERATE_INFOPLIST_FILE: false
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 67HWRVWPWT
        CODE_SIGN_IDENTITY: "Apple Development"
    dependencies:
      - package: SatelliteKit

  CQSatellitesTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - CQSatellitesTests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: true
    dependencies:
      - target: CQSatellites
